<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px; color: #333; background: #fff; padding: 16px;
    }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 11px; margin-bottom: 12px; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed #d4d4d8; border-radius: 8px; padding: 20px;
      text-align: center; cursor: pointer; transition: all 0.15s;
      margin-bottom: 12px; color: #888;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #7a5af8; background: #faf5ff; color: #7a5af8;
    }
    .drop-zone.loaded {
      border-color: #bbf7d0; background: #f0fdf4; color: #16a34a;
      border-style: solid;
    }
    .drop-icon { font-size: 18px; margin-bottom: 4px; }
    .drop-hint { font-size: 10px; color: #aaa; margin-top: 4px; }

    /* ── Config summary ── */
    .config-summary {
      display: none; background: #f8f8fa; border-radius: 6px;
      padding: 8px 10px; margin-bottom: 12px; font-size: 11px; line-height: 1.5;
    }
    .config-summary.visible { display: block; }
    .config-name { font-weight: 600; color: #333; }
    .config-stat { color: #666; }
    .config-fix { color: #7a5af8; }

    /* ── Buttons ── */
    .actions { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    button {
      padding: 10px 12px; border-radius: 6px; font-size: 12px;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: #7a5af8; color: #fff; flex: 1; }
    .btn-primary:hover { background: #6938ef; }
    .btn-primary:disabled { background: #d0d0d0; cursor: not-allowed; }
    .btn-fix { background: #16a34a; color: #fff; flex: 1; }
    .btn-fix:hover { background: #15803d; }
    .btn-fix:disabled { background: #d0d0d0; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #555; }
    .btn-secondary:hover { background: #e4e4e7; }
    .btn-small { padding: 6px 10px; font-size: 11px; flex: none; }
    .dry-run-label {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #666; white-space: nowrap; user-select: none;
    }
    .dry-run-label input { margin: 0; }

    /* ── Progress ── */
    .progress-bar {
      display: none; height: 4px; background: #f0f0f0;
      border-radius: 2px; margin-bottom: 12px; overflow: hidden;
    }
    .progress-bar.visible { display: block; }
    .progress-fill {
      height: 100%; background: #7a5af8; border-radius: 2px;
      transition: width 0.2s; width: 0%;
    }

    /* ── Summary cards ── */
    .summary { display: none; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .summary.visible { display: flex; }
    .card {
      flex: 1; min-width: 100px; padding: 10px 12px;
      border-radius: 8px; border: 1px solid #eee;
    }
    .card-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: #888; margin-bottom: 2px;
    }
    .card-value { font-size: 18px; font-weight: 700; }
    .card-ok { background: #f0fdf4; border-color: #bbf7d0; }
    .card-ok .card-value { color: #16a34a; }
    .card-err { background: #fef2f2; border-color: #fecaca; }
    .card-err .card-value { color: #dc2626; }
    .card-info { background: #f8f8f8; }
    .card-info .card-value { color: #333; }

    /* ── Publish badge ── */
    .publish-badge {
      display: none; text-align: center; padding: 10px;
      border-radius: 8px; font-weight: 600; font-size: 13px; margin-bottom: 12px;
    }
    .publish-badge.visible { display: block; }
    .publish-ready { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .publish-not-ready { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    /* ── Fix result badge ── */
    .fix-badge {
      display: none; text-align: center; padding: 10px;
      border-radius: 8px; font-weight: 600; font-size: 12px; margin-bottom: 12px;
    }
    .fix-badge.visible { display: block; }
    .fix-ok { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .fix-partial { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    .fix-dry { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

    /* ── Log ── */
    .log-area { display: none; }
    .log-area.visible { display: block; }
    .log-header {
      font-size: 11px; font-weight: 600; color: #666;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center;
    }
    .log {
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 10px; background: #18181b; color: #e4e4e7;
      padding: 10px; border-radius: 6px; max-height: 300px;
      overflow-y: auto; white-space: pre-wrap; line-height: 1.5;
    }
    .log .ok  { color: #4ade80; }
    .log .err { color: #f87171; }
    .log .info { color: #a1a1aa; }
    .log .summary { color: #fbbf24; font-weight: 600; }

    .export-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 4px;
      background: #27272a; color: #a1a1aa; border: 1px solid #3f3f46; cursor: pointer;
    }
    .export-btn:hover { background: #3f3f46; color: #e4e4e7; }

    /* ── Schema overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; justify-content: center; align-items: center; padding: 16px;
    }
    .overlay.visible { display: flex; }
    .overlay-content {
      background: #fff; border-radius: 8px; padding: 16px; max-width: 460px;
      width: 100%; max-height: 90vh; overflow-y: auto;
    }
    .overlay-content h3 { font-size: 13px; margin-bottom: 8px; }
    .overlay-content pre {
      font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 10px;
      background: #f4f4f5; padding: 10px; border-radius: 6px;
      overflow-x: auto; line-height: 1.5;
    }
    .overlay-close {
      float: right; background: none; border: none; font-size: 16px;
      cursor: pointer; color: #888; padding: 0;
    }
  </style>
</head>
<body>
  <h2>Design System Auditor</h2>
  <p class="subtitle">Drop a config to define detection rules, then audit &amp; fix</p>

  <!-- Config drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📂</div>
    <div>Drop audit config JSON here</div>
    <div class="drop-hint">or click to browse &mdash; <a href="#" id="schemaLink" style="color:#7a5af8">view schema</a></div>
  </div>
  <input type="file" id="fileInput" accept=".json" style="display:none">

  <!-- Config summary -->
  <div class="config-summary" id="configSummary"></div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-primary" id="btnAudit">Run Audit</button>
    <label class="dry-run-label">
      <input type="checkbox" id="chkDryRun" checked> Dry run
    </label>
    <button class="btn-fix" id="btnFix" disabled>Fix All</button>
  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Summary cards -->
  <div class="summary" id="summary">
    <div class="card" id="cardNodes">
      <div class="card-label">Nodes</div>
      <div class="card-value" id="valNodes">&mdash;</div>
    </div>
    <div class="card" id="cardOldColors">
      <div class="card-label">Flagged Colors</div>
      <div class="card-value" id="valOldColors">&mdash;</div>
    </div>
    <div class="card" id="cardFonts">
      <div class="card-label">Font Issues</div>
      <div class="card-value" id="valFonts">&mdash;</div>
    </div>
    <div class="card" id="cardStyles">
      <div class="card-label">Style Issues</div>
      <div class="card-value" id="valStyles">&mdash;</div>
    </div>
  </div>

  <!-- Badges -->
  <div class="publish-badge" id="publishBadge"></div>
  <div class="fix-badge" id="fixBadge"></div>

  <!-- Log -->
  <div class="log-area" id="logArea">
    <div class="log-header">
      <span>Log</span>
      <button class="export-btn" id="btnExport">Export JSON</button>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- Schema overlay -->
  <div class="overlay" id="schemaOverlay">
    <div class="overlay-content">
      <button class="overlay-close" id="schemaClose">&times;</button>
      <h3>Audit Config Schema</h3>
      <pre id="schemaCode"></pre>
    </div>
  </div>

  <script>
    // ── Elements ──
    var dropZone    = document.getElementById('dropZone');
    var fileInput   = document.getElementById('fileInput');
    var configSummaryEl = document.getElementById('configSummary');
    var btnAudit    = document.getElementById('btnAudit');
    var btnFix      = document.getElementById('btnFix');
    var chkDryRun   = document.getElementById('chkDryRun');
    var progressBar = document.getElementById('progressBar');
    var progressFill= document.getElementById('progressFill');
    var summaryEl   = document.getElementById('summary');
    var logArea     = document.getElementById('logArea');
    var logEl       = document.getElementById('log');
    var publishBadge= document.getElementById('publishBadge');
    var fixBadge    = document.getElementById('fixBadge');
    var btnExport   = document.getElementById('btnExport');
    var schemaOverlay = document.getElementById('schemaOverlay');
    var schemaLink  = document.getElementById('schemaLink');
    var schemaClose = document.getElementById('schemaClose');

    var auditData = null;
    var configLoaded = false;

    // ── Schema definition ──
    var SCHEMA_TEXT = JSON.stringify({
      "name": "My Theme Audit (optional label)",
      "detect": {
        "colors": {
          "#hexvalue": "label — old colors to flag on nodes",
          "#f8fafc": "slate-50",
          "#6366f1": "indigo-500"
        },
        "fonts": ["FontFamily1", "FontFamily2 — allowed fonts"],
        "shadowBases": {
          "#hexvalue": "label — old shadow base colors",
          "#0a0d12": "old-shadow-base"
        }
      },
      "fix": {
        "colorToVariable": {
          "#hexvalue": "Variable/Name/In/Figma — exact or substring",
          "#f8fafc": "Colors/Gray/Light mode/50"
        },
        "fontReplace": {
          "OldFamily": "NewFamily — specific mapping",
          "*": "FallbackFamily — catch-all for any disallowed font"
        }
      }
    }, null, 2);

    // ── Schema overlay ──
    document.getElementById('schemaCode').textContent = SCHEMA_TEXT;
    schemaLink.addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      schemaOverlay.classList.add('visible');
    });
    schemaClose.addEventListener('click', function() {
      schemaOverlay.classList.remove('visible');
    });
    schemaOverlay.addEventListener('click', function(e) {
      if (e.target === schemaOverlay) schemaOverlay.classList.remove('visible');
    });

    // ── File drop / browse ──
    dropZone.addEventListener('click', function(e) {
      if (e.target === schemaLink) return;
      fileInput.click();
    });
    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault(); dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length) loadFile(fileInput.files[0]);
    });

    function loadFile(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var json = JSON.parse(e.target.result);
          if (!json.detect && !json.fix) {
            throw new Error('Config must have at least "detect" or "fix" section');
          }
          // Send to plugin
          parent.postMessage({ pluginMessage: { type: 'set-config', config: json } }, '*');
          dropZone.classList.add('loaded');
          dropZone.innerHTML = '<div class="drop-icon">✓</div><div>' + file.name + ' loaded</div><div class="drop-hint">drop another file to replace</div>';
          configLoaded = true;
        } catch (err) {
          alert('Invalid config JSON:\n' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // ── Audit ──
    btnAudit.addEventListener('click', function() {
      btnAudit.disabled = true;
      btnAudit.textContent = 'Scanning...';
      btnFix.disabled = true;
      progressBar.classList.add('visible');
      progressFill.style.width = '0%';
      logArea.classList.add('visible');
      logEl.innerHTML = '';
      summaryEl.classList.remove('visible');
      publishBadge.classList.remove('visible');
      publishBadge.className = 'publish-badge';
      fixBadge.classList.remove('visible');
      fixBadge.className = 'fix-badge';

      parent.postMessage({ pluginMessage: { type: 'run-audit' } }, '*');
    });

    // ── Fix ──
    btnFix.addEventListener('click', function() {
      var dryRun = chkDryRun.checked;
      btnFix.disabled = true;
      btnFix.textContent = dryRun ? 'Dry running...' : 'Fixing...';
      btnAudit.disabled = true;
      fixBadge.classList.remove('visible');
      fixBadge.className = 'fix-badge';

      parent.postMessage({ pluginMessage: { type: 'run-fix', dryRun: dryRun } }, '*');
    });

    // ── Export ──
    btnExport.addEventListener('click', function() {
      if (!auditData) return;
      var blob = new Blob([JSON.stringify(auditData, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'audit-report.json'; a.click();
      URL.revokeObjectURL(url);
    });

    // ── Messages from plugin ──
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'log') {
        var span = document.createElement('span');
        span.className = msg.level || 'info';
        span.textContent = msg.text + '\n';
        logEl.appendChild(span);
        logEl.scrollTop = logEl.scrollHeight;
      }

      if (msg.type === 'log-batch') {
        var frag = document.createDocumentFragment();
        var items = msg.items;
        for (var li = 0; li < items.length; li++) {
          var sp = document.createElement('span');
          sp.className = items[li].level || 'info';
          sp.textContent = items[li].text + '\n';
          frag.appendChild(sp);
        }
        logEl.appendChild(frag);
        logEl.scrollTop = logEl.scrollHeight;
      }

      if (msg.type === 'progress') {
        var pct = Math.round(msg.current / msg.total * 100);
        progressFill.style.width = pct + '%';
      }

      if (msg.type === 'config-loaded') {
        configSummaryEl.classList.add('visible');
        var html = '<span class="config-name">' + msg.name + '</span><br>';
        html += '<span class="config-stat">Detect: ' + msg.detectColors + ' colors, '
              + msg.detectShadows + ' shadow bases, '
              + msg.detectFonts + ' allowed fonts</span>';
        if (msg.fixColors > 0 || msg.fixReplace > 0 || msg.fixFonts > 0) {
          html += '<br><span class="config-fix">Fix: '
                + msg.fixColors + ' color→variable, '
                + msg.fixReplace + ' color→hex, '
                + msg.fixFonts + ' font→font</span>';
        }
        configSummaryEl.innerHTML = html;
      }

      if (msg.type === 'audit-done') {
        btnAudit.disabled = false;
        btnAudit.textContent = 'Run Audit';
        progressFill.style.width = '100%';
        auditData = msg.summary;

        // Cards
        summaryEl.classList.add('visible');
        document.getElementById('valNodes').textContent = msg.summary.totalNodes;
        document.getElementById('cardNodes').className = 'card card-info';

        document.getElementById('valOldColors').textContent = msg.summary.oldColorCount;
        document.getElementById('cardOldColors').className = 'card ' + (msg.summary.oldColorCount === 0 ? 'card-ok' : 'card-err');

        document.getElementById('valFonts').textContent = msg.summary.fontMismatchCount;
        document.getElementById('cardFonts').className = 'card ' + (msg.summary.fontMismatchCount === 0 ? 'card-ok' : 'card-err');

        document.getElementById('valStyles').textContent = msg.summary.styleIssues;
        document.getElementById('cardStyles').className = 'card ' + (msg.summary.styleIssues === 0 ? 'card-ok' : 'card-err');

        // Publish badge
        publishBadge.classList.add('visible');
        if (msg.summary.publishReady) {
          publishBadge.classList.add('publish-ready');
          publishBadge.textContent = '✓ PUBLISH READY';
        } else {
          publishBadge.classList.add('publish-not-ready');
          var total = msg.summary.oldColorCount + msg.summary.fontMismatchCount + msg.summary.styleIssues;
          publishBadge.textContent = '✗ ' + total + ' issues to fix before publishing';
        }

        // Enable fix button if applicable
        if (msg.canFix) {
          btnFix.disabled = false;
        }
      }

      if (msg.type === 'fix-done') {
        btnAudit.disabled = false;
        btnAudit.textContent = 'Run Audit';
        btnFix.disabled = false;
        btnFix.textContent = 'Fix All';

        fixBadge.classList.add('visible');
        if (msg.dryRun) {
          fixBadge.classList.add('fix-dry');
          fixBadge.textContent = 'DRY RUN: ' + msg.totalFixed + ' would be fixed'
            + (msg.totalFailed > 0 ? ', ' + msg.totalFailed + ' would fail' : '');
        } else if (msg.totalFailed === 0 && msg.totalFixed > 0) {
          fixBadge.classList.add('fix-ok');
          fixBadge.textContent = '✓ ' + msg.totalFixed + ' fixed — re-run audit to verify';
        } else if (msg.totalFixed > 0) {
          fixBadge.classList.add('fix-partial');
          fixBadge.textContent = msg.totalFixed + ' fixed, ' + msg.totalFailed + ' failed — re-run audit';
        } else {
          fixBadge.classList.add('fix-partial');
          fixBadge.textContent = 'Nothing fixed (' + msg.totalFailed + ' failed)';
        }
      }
    };
  </script>
</body>
</html>
